<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crop Recommendation System</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='crop_recomendation.css')}}"> 
</head>
<body>

    <h1>Crop Recommendation System</h1>

    <p>
        This tool helps farmers select the best crops based on soil nutrients and weather conditions.
    </p>

    <form action="/predict" method="post">

        <label for="nitrogen">Nitrogen:</label>
        <input type="number" name="nitrogen" id="nitrogen" required><br><br>

        <label for="phosphorus">Phosphorus:</label>
        <input type="number" name="phosphorus" id="phosphorus" required><br><br>

        <label for="potassium">Potassium:</label>
        <input type="number" name="potassium" id="potassium" required><br><br>

        <label for="temperature">Temperature (°C):</label>
        <input type="number" step="any" name="temperature" id="temperature" required><br><br>

        <label for="humidity">Humidity (%):</label>
        <input type="number" step="any" name="humidity" id="humidity" required><br><br>

        <label for="ph">pH Level:</label>
        <input type="number" step="any" name="ph" id="ph" required><br><br>

        <label for="rainfall">Rainfall (mm):</label>
        <input type="number" step="any" name="rainfall" id="rainfall" required><br><br>

        <input type="submit" value="Get Recommendation">

    </form>

    <h2>{{ prediction_text }}</h2>

</body>
</html>
